# =============================================================================
# Domain: Selling
# Entity: Quotation + QuotationItem
# Description: The offer at the head of the order-to-cash pipeline. A priced,
# time-boxed proposal to a customer. Converts into a SalesOrder on acceptance.
# All cross-module references (customer, item, company, branch) are LOGICAL FKs
# (@exclude_from_foreign_key_check) — no DB constraint into another module's schema.
# =============================================================================

models:
  - name: Quotation
    collection: quotations
    description: "A priced, time-boxed proposal to a customer (order-to-cash head)"

    fields:
      id:
        type: uuid
        attributes: ["@id", "@default(uuid)"]
        description: "Unique quotation identifier"

      quotation_number:
        type: string
        attributes: ["@required", "@max(40)"]
        description: "Human reference (e.g. QUO-2026-00042)"

      company_id:
        type: uuid
        attributes: ["@required", "@exclude_from_foreign_key_check"]
        description: "Books owner # logical FK to organization.Company.id"

      branch_id:
        type: uuid?
        attributes: ["@exclude_from_foreign_key_check"]
        description: "Issuing branch # logical FK to organization.Branch.id"

      customer_id:
        type: uuid
        attributes: ["@required", "@exclude_from_foreign_key_check"]
        description: "Customer # logical FK to party.Party.id"

      status:
        type: QuotationStatus
        attributes: ["@default(draft)"]
        description: "Lifecycle status"

      quotation_date:
        type: date
        attributes: ["@required"]
        description: "Date the quotation is issued"

      valid_until:
        type: date?
        description: "Offer expiry date (inclusive)"

      currency:
        type: string
        attributes: ["@default(\"IDR\")", "@max(3)"]
        description: "ISO currency code"

      # Money — computed from lines by the validated write path (2dp, round-half-up).
      subtotal:
        type: decimal
        attributes: ["@default(0)", "@precision(18,2)", "@non_negative"]
        description: "Sum of line amounts before tax"

      tax_rate:
        type: decimal
        attributes: ["@default(0)", "@precision(9,4)", "@non_negative"]
        description: "Supplied PPN rate % (real multi-rate tax comes from backbone-tax; see ADR-002)"

      tax_amount:
        type: decimal
        attributes: ["@default(0)", "@precision(18,2)", "@non_negative"]
        description: "Tax on subtotal"

      total:
        type: decimal
        attributes: ["@default(0)", "@precision(18,2)", "@non_negative"]
        description: "Grand total (subtotal + tax_amount)"

      notes:
        type: string?
        attributes: ["@max(1000)"]
        description: "Free-text terms/notes"

      metadata:
        type: Metadata
        attributes: ["@audit_metadata"]
        description: "Audit metadata (created_at, updated_at, deleted_at, created_by, updated_by, deleted_by)"

    relations:
      items:
        type: QuotationItem[]
        attributes: ["@one_to_many"]
        description: "Line items"
        inverse: quotation

    indexes:
      - type: unique
        fields: [quotation_number]
        where: "deleted_at IS NULL"
      - type: index
        fields: [company_id, customer_id, status]
      - type: index
        fields: [quotation_date]

  - name: QuotationItem
    collection: quotation_items
    description: "One priced line of a quotation"

    fields:
      id:
        type: uuid
        attributes: ["@id", "@default(uuid)"]
        description: "Unique line identifier"

      quotation_id:
        type: uuid
        attributes: ["@required", "@foreign_key(Quotation.id)"]
        description: "Owning quotation"

      item_id:
        type: uuid
        attributes: ["@required", "@exclude_from_foreign_key_check"]
        description: "Catalog item # logical FK to catalog.Item.id"

      description:
        type: string?
        attributes: ["@max(300)"]
        description: "Line description snapshot"

      quantity:
        type: decimal
        attributes: ["@required", "@precision(18,4)", "@non_negative"]
        description: "Quantity offered"

      unit_price:
        type: decimal
        attributes: ["@required", "@precision(18,2)", "@non_negative"]
        description: "Price per unit"

      line_discount:
        type: decimal
        attributes: ["@default(0)", "@precision(18,2)", "@non_negative"]
        description: "Absolute discount on the line"

      line_amount:
        type: decimal
        attributes: ["@default(0)", "@precision(18,2)", "@non_negative"]
        description: "quantity * unit_price - line_discount (computed by write path)"

      metadata:
        type: Metadata
        attributes: ["@audit_metadata"]
        description: "Audit metadata"

    relations:
      quotation:
        type: Quotation
        attributes: ["@one", "@foreign_key(quotation_id)"]
        description: "Owning quotation"
        inverse: items

    indexes:
      - type: index
        fields: [quotation_id]

# =============================================================================
# Enums
# =============================================================================

enums:
  - name: QuotationStatus
    description: "Quotation lifecycle"
    variants:
      - name: draft
        description: "Being prepared"
        default: true
      - name: sent
        description: "Issued to the customer"
      - name: accepted
        description: "Customer accepted; convertible to a Sales Order"
      - name: ordered
        description: "Converted into a Sales Order"
      - name: rejected
        description: "Customer declined"
      - name: expired
        description: "Passed valid_until without acceptance"
      - name: cancelled
        description: "Withdrawn"
