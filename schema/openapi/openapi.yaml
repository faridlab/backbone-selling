components:
  schemas:
    Quotation:
      type: object
      required:
        - id
        - quotation_number
        - company_id
        - customer_id
        - status
        - quotation_date
        - currency
        - subtotal
        - tax_rate
        - tax_amount
        - total
        - metadata
      properties:
        id:
          type: string
          format: uuid
        quotation_number:
          type: string
          maxLength: 40
        company_id:
          type: string
          format: uuid
        branch_id:
          nullable: true
          type: string
          format: uuid
        customer_id:
          type: string
          format: uuid
        status:
          type: string
        quotation_date:
          type: string
          format: date
        valid_until:
          nullable: true
          type: string
          format: date
        currency:
          type: string
          maxLength: 3
        subtotal:
          type: string
        tax_rate:
          type: string
        tax_amount:
          type: string
        total:
          type: string
        notes:
          nullable: true
          type: string
          maxLength: 1000
        metadata:
          type: object

    QuotationBulkResult:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Quotation'
        total: { type: integer }
        failed: { type: integer }
        errors:
          type: array
          items: { type: string }

    CreateQuotationRequest:
      type: object
      required:
        - quotation_number
        - company_id
        - customer_id
        - status
        - quotation_date
        - currency
        - subtotal
        - tax_rate
        - tax_amount
        - total
        - metadata
      properties:
        quotation_number:
          type: string
          maxLength: 40
        company_id:
          type: string
          format: uuid
        branch_id:
          nullable: true
          type: string
          format: uuid
        customer_id:
          type: string
          format: uuid
        status:
          type: string
        quotation_date:
          type: string
          format: date
        valid_until:
          nullable: true
          type: string
          format: date
        currency:
          type: string
